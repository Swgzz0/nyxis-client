<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Nyxis | Premium Ghost Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .payment-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { text-align: center; margin-bottom: 20px; font-size: 48px; }
        .logo span { color: #64C8FF; }
        h1 { text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666666; margin-bottom: 25px; font-size: 14px; }
        .price-display { text-align: center; font-size: 48px; color: #64C8FF; margin-bottom: 30px; }
        .price-display small { font-size: 16px; color: #888; }
        .plan-badge {
            display: inline-block;
            background: rgba(100, 200, 255, 0.1);
            color: #64C8FF;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #CCCCCC; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #64C8FF; }
        .card-row { display: flex; gap: 15px; }
        .card-row .form-group { flex: 1; }
        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #64C8FF, #3A7BD5);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            color: #0A0A0A;
            transition: transform 0.2s;
        }
        .buy-btn:hover { transform: scale(1.02); }
        .buy-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .secure { text-align: center; margin-top: 20px; color: #666666; font-size: 12px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888888; text-decoration: none; }
        .back-link:hover { color: #64C8FF; }
        .error-msg { color: #FF4444; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="logo">✦ <span>NYXIS</span></div>
        <h1>Complete Your Purchase</h1>
        <div class="subtitle">Get instant access to the undetectable ghost client</div>

        <div id="planDisplay" style="text-align: center; margin-bottom: 20px;">
            <span class="plan-badge" id="planBadge">Monthly Plan</span>
            <div class="price-display" id="priceDisplay">£15.99 <small>GBP</small></div>
        </div>

        <form id="paymentForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" id="card" placeholder="4242 4242 4242 4242" required>
            </div>
            <div class="card-row">
                <div class="form-group">
                    <label>Expiry</label>
                    <input type="text" placeholder="MM/YY" required>
                </div>
                <div class="form-group">
                    <label>CVC</label>
                    <input type="text" placeholder="123" required>
                </div>
            </div>
            <button type="submit" class="buy-btn">Purchase Nyxis →</button>
        </form>

        <div id="errorMsg" class="error-msg"></div>
        <div class="secure">🔒 Secure payment powered by Stripe</div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        const BACKEND = 'https://nyxis-backend.onrender.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'monthly';

        const plans = {
            weekly: { name: 'Weekly Plan', price: '£6.99', badge: '7 days access' },
            monthly: { name: 'Monthly Plan', price: '£15.99', badge: '30 days access' },
            lifetime: { name: 'Lifetime Plan', price: '£25.99', badge: 'Unlimited access' }
        };

        const selected = plans[plan] || plans.monthly;
        document.getElementById('planBadge').innerText = selected.badge;
        document.getElementById('priceDisplay').innerHTML = `${selected.price} <small>GBP</small>`;

        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            if (!name || !email) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerText = 'Please enter your name and email';
                return;
            }

            const btn = document.querySelector('.buy-btn');
            btn.innerText = 'Processing...';
            btn.disabled = true;

            try {
                const user = JSON.parse(localStorage.getItem('nyxis_user') || '{}');
                const res = await fetch(`${BACKEND}/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user.id || 1, plan: plan })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = `activate.html?key=${data.key}&email=${email}&plan=${plan}`;
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('errorMsg').innerText = data.error || 'Purchase failed';
                    btn.innerText = 'Purchase Nyxis →';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerText = 'Cannot connect to server';
                btn.innerText = 'Purchase Nyxis →';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
