<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Nyxis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
        }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar .logo { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        .sidebar .logo span { color: #64C8FF; }
        .sidebar .menu-item {
            display: block;
            padding: 12px 16px;
            color: #888;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.2s;
        }
        .sidebar .menu-item:hover, .sidebar .menu-item.active {
            background: rgba(100, 200, 255, 0.1);
            color: #64C8FF;
        }
        .main-content {
            margin-left: 260px;
            padding: 30px 40px;
            flex: 1;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card .number { font-size: 32px; font-weight: 800; color: #64C8FF; }
        .stat-card .label { color: #666; font-size: 13px; margin-top: 5px; }
        .section-title { font-size: 20px; font-weight: 700; margin: 30px 0 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #666; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        td { font-size: 14px; }
        .ban-btn { background: #FF4444; border: none; padding: 4px 12px; border-radius: 6px; color: #FFF; cursor: pointer; font-size: 12px; }
        .unban-btn { background: #33AA33; border: none; padding: 4px 12px; border-radius: 6px; color: #FFF; cursor: pointer; font-size: 12px; }
        .delete-btn { background: #FF4444; border: none; padding: 4px 12px; border-radius: 6px; color: #FFF; cursor: pointer; font-size: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { color: #666; display: block; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #FFF;
        }
        .btn-primary {
            background: linear-gradient(135deg, #64C8FF, #3A7BD5);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            color: #0A0A0A;
        }
        .btn-primary:hover { transform: scale(1.02); }
        .log-entry {
            font-size: 13px;
            color: #888;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .log-entry .time { color: #444; margin-right: 10px; }
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 15px 10px; }
            .sidebar .logo span, .sidebar .menu-item span { display: none; }
            .main-content { margin-left: 60px; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <nav class="sidebar">
            <div class="logo">✦ <span>NYXIS</span></div>
            <a href="#" class="menu-item active" data-tab="dashboard">📊 Dashboard</a>
            <a href="#" class="menu-item" data-tab="users">👥 Users</a>
            <a href="#" class="menu-item" data-tab="logs">📜 Logs</a>
            <a href="#" class="menu-item" data-tab="keys">🔑 Keys</a>
            <a href="index.html" class="menu-item" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">🏠 Website</a>
            <a href="login.html" class="menu-item" onclick="localStorage.removeItem('nyxis_user')">🚪 Logout</a>
        </nav>

        <div class="main-content">
            <div id="tab-dashboard" class="tab-content active">
                <h1 style="font-size: 28px; margin-bottom: 5px;">Admin Dashboard</h1>
                <p style="color: #666; margin-bottom: 30px;">Overview of your Nyxis client business</p>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card"><div class="number" id="statUsers">0</div><div class="label">Total Users</div></div>
                    <div class="stat-card"><div class="number" id="statActive">0</div><div class="label">Active Subscriptions</div></div>
                </div>
            </div>

            <div id="tab-users" class="tab-content">
                <h2 class="section-title">👥 All Users</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-logs" class="tab-content">
                <h2 class="section-title">📜 Activity Logs</h2>
                <div id="logsContainer"></div>
            </div>

            <div id="tab-keys" class="tab-content">
                <h2 class="section-title">🔑 Generate License Key</h2>
                <div style="background: rgba(255,255,255,0.03); border-radius: 16px; padding: 30px; max-width: 500px;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="keyUser" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Plan</label>
                        <select id="keyPlan">
                            <option value="weekly">Weekly (£6.99)</option>
                            <option value="monthly">Monthly (£15.99)</option>
                            <option value="lifetime">Lifetime (£25.99)</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="generateKey()">Generate Key</button>
                    <div id="keyResult" style="margin-top: 15px; color: #64C8FF; font-family: monospace; font-size: 16px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND = https://nyxis-backend.onrender.com;

        // Check if user is admin
        const user = JSON.parse(localStorage.getItem('nyxis_user') || '{}');
        if (!user.is_admin) {
            window.location.href = 'login.html';
        }

        async function loadStats() {
            try {
                const res = await fetch(`${BACKEND}/stats`);
                const data = await res.json();
                document.getElementById('statUsers').innerText = data.total_users || 0;
                document.getElementById('statActive').innerText = data.active_subscriptions || 0;
            } catch {}
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${BACKEND}/users`);
                const data = await res.json();
                const tbody = document.getElementById('usersTable');
                tbody.innerHTML = '';
                data.users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.id}</td>
                        <td>${u.username} ${u.is_admin ? '👑' : ''}</td>
                        <td>${u.email}</td>
                        <td>${u.is_banned ? '❌ Banned' : '✅ Active'}</td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                        <td>
                            ${u.is_banned ? `<button class="unban-btn" onclick="updateUser(${u.id}, 'unban')">Unban</button>` : `<button class="ban-btn" onclick="updateUser(${u.id}, 'ban')">Ban</button>`}
                            <button class="delete-btn" onclick="updateUser(${u.id}, 'delete')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch {}
        }

        async function updateUser(id, action) {
            if (!confirm(`Are you sure you want to ${action} this user?`)) return;
            try {
                await fetch(`${BACKEND}/user/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });
                loadUsers();
                loadStats();
            } catch {}
        }

        async function loadLogs() {
            try {
                const res = await fetch(`${BACKEND}/logs`);
                const data = await res.json();
                const container = document.getElementById('logsContainer');
                container.innerHTML = '';
                data.logs.forEach(l => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerHTML = `<span class="time">${new Date(l.timestamp).toLocaleString()}</span> ${l.username} — ${l.action}`;
                    container.appendChild(div);
                });
            } catch {}
        }

        async function generateKey() {
            const username = document.getElementById('keyUser').value;
            const plan = document.getElementById('keyPlan').value;
            if (!username) {
                document.getElementById('keyResult').innerText = 'Please enter a username';
                return;
            }
            try {
                const res = await fetch(`${BACKEND}/generate-key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, plan })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('keyResult').innerHTML = `✅ Key generated: <strong>${data.key}</strong><br>Plan: ${data.plan}`;
                    loadStats();
                } else {
                    document.getElementById('keyResult').innerText = data.error || 'Error generating key';
                }
            } catch {
                document.getElementById('keyResult').innerText = 'Error connecting to server';
            }
        }

        document.querySelectorAll('.menu-item[data-tab]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById('tab-' + item.dataset.tab).classList.add('active');
            });
        });

        loadStats();
        loadUsers();
        loadLogs();
    </script>
</body>
</html>
