<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Nyxis | Download</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .activate-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        .logo span { color: #64C8FF; }
        h1 { margin-bottom: 5px; }
        .sub { color: #888888; margin-bottom: 25px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .activate-btn {
            width: 100%;
            background: linear-gradient(135deg, #64C8FF, #3A7BD5);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            color: #0A0A0A;
        }
        .activate-btn:hover { transform: scale(1.02); }
        .activate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .download-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        .download-btn {
            background: linear-gradient(135deg, #64C8FF, #3A7BD5);
            border: none;
            padding: 14px 30px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #0A0A0A;
            text-decoration: none;
            display: inline-block;
        }
        .key-display {
            background: rgba(100, 200, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 2px;
            color: #64C8FF;
        }
        .error { color: #FF4444; margin-top: 10px; display: none; }
        .success { color: #64C8FF; margin-top: 10px; display: none; }
        .back-link { display: block; margin-top: 20px; color: #888888; text-decoration: none; }
        .back-link:hover { color: #64C8FF; }
        .plan-tag {
            display: inline-block;
            background: rgba(100, 200, 255, 0.1);
            color: #64C8FF;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="activate-container">
        <div class="logo">✦ <span>NYXIS</span></div>
        <h1>Activate Your License</h1>
        <div class="sub">Enter your key to unlock the undetectable ghost client</div>

        <div id="planTag" style="display: none;">
            <span class="plan-tag" id="planBadge">Monthly Plan</span>
        </div>

        <input type="text" id="licenseKey" placeholder="NYX-XXXX-XXXX-XXXX" autocomplete="off">
        <button class="activate-btn" onclick="activateKey()">Activate Nyxis →</button>

        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>

        <div id="downloadSection" class="download-section">
            <div class="key-display" id="keyDisplay"></div>
            <a href="#" class="download-btn" id="downloadLink">⬇ Download Nyxis Client</a>
            <p style="margin-top: 15px; font-size: 12px; color: #666;">Your license is now permanently activated</p>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        const BACKEND = https://nyxis-backend.onrender.com;
        const urlParams = new URLSearchParams(window.location.search);
        const keyFromUrl = urlParams.get('key');
        const planFromUrl = urlParams.get('plan') || 'monthly';

        const planNames = {
            weekly: 'Weekly Plan (7 days)',
            monthly: 'Monthly Plan (30 days)',
            lifetime: 'Lifetime Plan (Unlimited)'
        };

        if (keyFromUrl) {
            document.getElementById('licenseKey').value = keyFromUrl;
            document.getElementById('planTag').style.display = 'block';
            document.getElementById('planBadge').innerText = planNames[planFromUrl] || 'Monthly Plan';
            activateKey();
        }

        async function activateKey() {
            const key = document.getElementById('licenseKey').value.trim().toUpperCase();
            if (!key) {
                showError('Please enter your license key');
                return;
            }

            const btn = document.querySelector('.activate-btn');
            btn.innerText = 'Verifying...';
            btn.disabled = true;

            try {
                const user = JSON.parse(localStorage.getItem('nyxis_user') || '{}');
                const res = await fetch(`${BACKEND}/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: key, user_id: user.id || 1 })
                });
                const data = await res.json();

                if (data.success) {
                    showSuccess('License activated successfully!');
                    document.getElementById('downloadSection').style.display = 'block';
                    document.getElementById('keyDisplay').innerText = key;
                    localStorage.setItem('nyxis_license', key);
                } else {
                    showError(data.error || 'Invalid license key');
                }
            } catch (err) {
                showError('Cannot connect to server');
            }

            btn.innerText = 'Activate Nyxis →';
            btn.disabled = false;
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.innerText = msg;
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
